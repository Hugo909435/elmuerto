<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>El Muerto Arcade — Parties privées</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0b1020;
        --card: rgba(255, 255, 255, 0.04);
        --card-border: rgba(255, 255, 255, 0.1);
        --accent: #4ade80;
        --accent-2: #22a85a;
      }
      body {
        font-family: 'Trebuchet MS', system-ui, sans-serif;
        color: #fff;
        background: radial-gradient(
            1200px 800px at 80% -10%,
            #1b2a4a 0%,
            transparent 60%
          ),
          radial-gradient(900px 700px at -10% 110%, #16352a 0%, transparent 55%),
          var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 20px 60px;
      }

      header {
        text-align: center;
        margin-bottom: clamp(28px, 6vw, 48px);
      }
      .logo {
        font-size: clamp(12px, 2.4vw, 15px);
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.9;
        margin-bottom: 12px;
      }
      h1 {
        font-size: clamp(34px, 8vw, 64px);
        line-height: 1.02;
        letter-spacing: 1px;
        text-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
      }
      header p {
        margin-top: 14px;
        font-size: clamp(14px, 3.4vw, 18px);
        opacity: 0.65;
      }

      .panel {
        width: 100%;
        max-width: 440px;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 22px;
        padding: clamp(22px, 5vw, 32px);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
      }
      .hidden {
        display: none !important;
      }

      label {
        display: block;
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        opacity: 0.6;
        margin: 0 0 8px 4px;
      }
      input {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 17px;
        color: #fff;
        font-family: inherit;
        margin-bottom: 18px;
        outline: none;
        transition: border-color 0.15s ease;
      }
      input:focus {
        border-color: var(--accent);
      }
      input.code {
        text-align: center;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 10px;
        text-transform: uppercase;
      }

      .btn {
        cursor: pointer;
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 16px;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: inherit;
        transition: transform 0.1s ease, filter 0.15s ease;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn.primary {
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: #05290f;
      }
      .btn.ghost {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      .btn + .btn {
        margin-top: 12px;
      }
      .btn-link {
        display: inline-block;
        margin-top: 18px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.55);
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        text-decoration: underline;
      }

      .or {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 22px 0;
        opacity: 0.4;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .or::before,
      .or::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
      }

      /* ----- Salle d'attente ----- */
      .room-code-box {
        text-align: center;
        margin-bottom: 22px;
      }
      .room-code-box .small {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.5;
      }
      #room-code {
        font-size: clamp(40px, 12vw, 56px);
        font-weight: 800;
        letter-spacing: 12px;
        color: var(--accent);
        margin: 6px 0 10px;
      }
      ul {
        list-style: none;
      }
      .player {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        margin-bottom: 8px;
      }
      .player .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }
      .player .pname {
        flex: 1;
        font-weight: 600;
      }
      .player .badge {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 3px 10px;
        border-radius: 999px;
        background: rgba(74, 222, 128, 0.18);
        color: var(--accent);
      }
      #wait-msg {
        text-align: center;
        opacity: 0.65;
        margin-top: 16px;
        font-size: 15px;
      }

      /* ----- Roue des jeux ----- */
      .roulette-title {
        text-align: center;
        font-size: clamp(18px, 5vw, 22px);
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 18px;
      }
      .wheel-wrap {
        position: relative;
        width: 320px;
        max-width: 100%;
        aspect-ratio: 1 / 1;
        margin: 0 auto 18px;
      }
      .wheel-wrap canvas {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 50%;
        filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.55));
      }
      .wheel-pointer {
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 16px solid transparent;
        border-right: 16px solid transparent;
        border-top: 28px solid #fff;
        z-index: 5;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.45));
      }
      #roulette-msg {
        text-align: center;
        opacity: 0.82;
        margin-bottom: 14px;
        font-size: 15px;
        min-height: 1.2em;
      }

      #error-banner {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        background: #b91c1c;
        color: #fff;
        padding: 12px 22px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        z-index: 100;
        max-width: 90vw;
        text-align: center;
      }

      footer {
        margin-top: 36px;
        font-size: 13px;
        opacity: 0.4;
        text-align: center;
      }
    </style>
    <script type="module" crossorigin src="/assets/main-C5zmoPbN.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  </head>
  <body>
    <div id="error-banner" class="hidden"></div>

    <header>
      <div class="logo">El Muerto Arcade</div>
      <h1>💀 Parties privées</h1>
      <p>Crée une partie, partage le code, et joue entre amis.</p>
    </header>

    <!-- Vue d'accueil : créer / rejoindre -->
    <section id="view-home" class="panel">
      <label for="name-create">Ton pseudo</label>
      <input id="name-create" type="text" maxlength="16" placeholder="Ex : Hugo" />
      <button id="btn-show-create" class="btn primary">Créer une partie</button>
      <div class="or">ou</div>
      <button id="btn-show-join" class="btn ghost">Rejoindre une partie</button>
    </section>

    <!-- Vue rejoindre : saisie du code -->
    <section id="view-join" class="panel hidden">
      <label for="code-join">Code de la partie</label>
      <input
        id="code-join"
        class="code"
        type="text"
        maxlength="4"
        placeholder="XXXX"
        autocomplete="off"
      />
      <label for="name-join">Ton pseudo</label>
      <input id="name-join" type="text" maxlength="16" placeholder="Ex : Hugo" />
      <button id="btn-join" class="btn primary">Rejoindre</button>
      <button id="btn-back-home" class="btn-link">← Retour</button>
    </section>

    <!-- Vue salle d'attente -->
    <section id="view-room" class="panel hidden">
      <div class="room-code-box">
        <div class="small">Code de la partie</div>
        <div id="room-code">----</div>
        <button id="btn-copy-code" class="btn ghost" style="width: auto; padding: 10px 22px; font-size: 13px;">
          Copier le code
        </button>
      </div>

      <label>Joueurs connectés</label>
      <ul id="player-list"></ul>

      <button id="start-btn" class="btn primary hidden" style="margin-top: 14px;">
        Lancer la partie
      </button>
      <p id="wait-msg">En attente que l'hôte lance la partie…</p>

      <button id="btn-leave" class="btn-link">← Quitter la partie</button>
    </section>

    <!-- Vue roue des jeux -->
    <section id="view-roulette" class="panel hidden">
      <div class="roulette-title">🎰 La roue des jeux</div>
      <div class="wheel-wrap">
        <div class="wheel-pointer"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
      </div>
      <p id="roulette-msg">En attente…</p>
      <button id="spin-btn" class="btn primary hidden">Faire tourner 🎯</button>
    </section>

    <footer>© <span id="year"></span> El Muerto Arcade · Mini Golf bientôt jouable ici</footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
